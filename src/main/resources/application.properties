# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application name ──────────────────────────────────────────────────────────
spring.application.name=vulnerable-app

# ── H2 in-memory database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:vulndb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ⚠️ VULNERABILITY: H2 web console enabled with no auth – exposes full DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── Actuator ──────────────────────────────────────────────────────────────────
# ⚠️ VULNERABILITY: All actuator endpoints exposed with no authentication
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.enabled=true
management.endpoint.beans.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example=DEBUG
logging.level.org.springframework.jdbc=DEBUG
